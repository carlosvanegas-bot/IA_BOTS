name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Supabase credentials into index.html
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "⚠️ WARNING: Secrets SUPABASE_URL o SUPABASE_KEY no configurados."
          fi
          sed -i "s|__SUPABASE_URL__|$SUPABASE_URL|g" index.html
          sed -i "s|__SUPABASE_KEY__|$SUPABASE_KEY|g" index.html
          echo "✅ Credenciales inyectadas en index.html"

      - name: Verify injection
        run: |
          if grep -q '__SUPABASE_URL__' index.html; then
            echo "❌ ERROR: Los placeholders no fueron reemplazados. Verifica los secrets."
            exit 1
          fi
          echo "✅ Verificación exitosa - credentials inyectados correctamente"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
